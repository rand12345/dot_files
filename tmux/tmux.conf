# Tmux Configuration
# Works on macOS and Linux

# ============================================================================
# General Settings
# ============================================================================

# Enable mouse support (trackpad scrolling, clicking panes, resizing)
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 10000

# Enable vi mode for copy mode
setw -g mode-keys vi

# Don't rename windows automatically
set -g allow-rename off

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Enable 256 color support
set -g default-terminal "screen-256color"

# Set escape time to 0 for better vim compatibility
set -sg escape-time 0

# Increase display time for pane numbers
set -g display-panes-time 2000

# ============================================================================
# Key Bindings
# ============================================================================

# Reload config file with Prefix + r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Switch panes using Alt+arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes using Prefix + Arrow keys
bind Left resize-pane -L 5
bind Right resize-pane -R 5
bind Up resize-pane -U 5
bind Down resize-pane -D 5

# ============================================================================
# Vi Mode Copy/Paste
# ============================================================================

# Vi-style copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# Platform-specific clipboard integration
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# ============================================================================
# Status Bar
# ============================================================================

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style bg=colour234,fg=colour137

# Left status
set -g status-left ''

# Right status - show hostname, date, time
set -g status-right '#[fg=colour233,bg=colour241,bold] %Y-%m-%d #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

# Window status
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

setw -g window-status-style fg=colour138,bg=colour235,none
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# ============================================================================
# Pane Borders
# ============================================================================

set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour51

# ============================================================================
# Messages
# ============================================================================

set -g message-style fg=colour232,bg=colour166,bold

# ============================================================================
# Plugins (Optional)
# ============================================================================

# TPM (Tmux Plugin Manager) - uncomment to use
# Requires: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
